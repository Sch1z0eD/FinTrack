name: Release

# Publishing is driven by a tag:
#   git tag v1.2.0      && git push origin v1.2.0       -> stable release
#   git tag v1.2.1-beta && git push origin v1.2.1-beta  -> prerelease, beta app only
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive version and channel from tag
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          if [ "${RAW%-beta}" != "$RAW" ]; then
            CHANNEL=beta
            NAME="${RAW%-beta}"
          else
            CHANNEL=stable
            NAME="$RAW"
          fi

          if ! echo "$NAME" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag must be v1.2.3 or v1.2.3-beta, got $GITHUB_REF_NAME" >&2
            exit 1
          fi

          MAJOR=$(echo "$NAME" | cut -d. -f1)
          MINOR=$(echo "$NAME" | cut -d. -f2)
          PATCH=$(echo "$NAME" | cut -d. -f3)
          # Monotonic as long as minor and patch stay below 100.
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          # Only the github flavor is published here; the rustore flavor is uploaded to RuStore
          # by hand and carries no self-update path, so a tag never builds it.
          if [ "$CHANNEL" = beta ]; then
            # The beta build type appends -beta to the version name itself.
            echo "gradle_task=:app:assembleGithubBeta" >> "$GITHUB_OUTPUT"
            echo "apk_path=app/build/outputs/apk/github/beta/app-github-beta.apk" >> "$GITHUB_OUTPUT"
            echo "asset=fintrack-beta-$NAME.apk" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "gradle_task=:app:assembleGithubRelease" >> "$GITHUB_OUTPUT"
            echo "apk_path=app/build/outputs/apk/github/release/app-github-release.apk" >> "$GITHUB_OUTPUT"
            echo "asset=fintrack-$NAME.apk" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"

      - name: Unit tests
        run: ./gradlew :loanengine:test :app:testGithubDebugUnitTest

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 secret is missing - the APK would be unsigned and could not be installed." >&2
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew ${{ steps.version.outputs.gradle_task }} \
            -PappVersionName=${{ steps.version.outputs.name }} \
            -PappVersionCode=${{ steps.version.outputs.code }}

      - name: Name the APK after its version
        run: mv "${{ steps.version.outputs.apk_path }}" "${{ steps.version.outputs.asset }}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.asset }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true

      - name: Remove keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"
