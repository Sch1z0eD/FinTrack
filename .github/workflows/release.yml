name: Release

# Publishing is driven by a tag: `git tag v1.2.0 && git push origin v1.2.0`.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive version from tag
        id: version
        run: |
          NAME="${GITHUB_REF_NAME#v}"
          if ! echo "$NAME" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag must look like v1.2.3, got $GITHUB_REF_NAME" >&2
            exit 1
          fi
          MAJOR=$(echo "$NAME" | cut -d. -f1)
          MINOR=$(echo "$NAME" | cut -d. -f2)
          PATCH=$(echo "$NAME" | cut -d. -f3)
          # Monotonic as long as minor and patch stay below 100.
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"

      - name: Unit tests
        run: ./gradlew :loanengine:test :app:testDebugUnitTest

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 secret is missing - the APK would be unsigned and could not be installed." >&2
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease \
            -PappVersionName=${{ steps.version.outputs.name }} \
            -PappVersionCode=${{ steps.version.outputs.code }}

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             "fintrack-${{ steps.version.outputs.name }}.apk"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: fintrack-${{ steps.version.outputs.name }}.apk
          # The in-app update check reads versionCode from here.
          body: |
            versionCode: ${{ steps.version.outputs.code }}
          generate_release_notes: true

      - name: Remove keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"
