name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
  workflow_dispatch:

concurrency:
  # A newer push makes the running build irrelevant.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # Matches gradle/gradle-daemon-jvm.properties (toolchainVersion=21).
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        # github variant runs the shared tests plus the update-engine tests in src/testGithub.
        run: ./gradlew :loanengine:test :app:testGithubDebugUnitTest

      - name: Lint
        run: ./gradlew :app:lintGithubDebug

      - name: Assemble debug
        # Builds both distributions (githubDebug + rustoreDebug), so a break in either shows up.
        run: ./gradlew assembleDebug

      - name: Upload reports
        # Reports are only interesting when something broke.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            app/build/reports/
            loanengine/build/reports/
          retention-days: 7
